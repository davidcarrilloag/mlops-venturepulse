# .github/workflows/train.yml

name: Train Model

on:
  workflow_call:

jobs:
  train:
    name: Train VenturePulse Model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install training dependencies
        run: pip install -r 07-cicd/requirements.txt

      - name: Train model
        working-directory: 07-cicd
        run: python train.py

      - name: Verify artifact contents
        run: |
          ls -R 07-cicd/models
          cat 07-cicd/run_id.txt

      - name: Upload trained model
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            07-cicd/run_id.txt
            07-cicd/models/
          retention-days: 7
